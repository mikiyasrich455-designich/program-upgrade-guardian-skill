name: IDL Compatibility Check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "programs/**"
      - "target/idl/**"
      - "Cargo.toml"
      - "Anchor.toml"

jobs:
  idl-check:
    name: IDL Compatibility Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor-cli

      - name: Build program
        run: anchor build

      - name: Fetch on-chain IDL
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: |
          anchor idl fetch ${{ secrets.PROGRAM_ID }} \
            --provider.cluster mainnet > idl/onchain.json

      - name: Run IDL compatibility check
        run: npx ts-node scripts/idl-check.ts

      - name: Upload IDL artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: idl-diff
          path: |
            idl/onchain.json
            target/idl/*.json
